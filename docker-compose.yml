version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: jft-postgres
    restart: always
    environment:
      POSTGRES_USER: jftuser
      POSTGRES_PASSWORD: jftpassword
      POSTGRES_DB: jftdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jft-network

  backend:
    build: ./backend
    container_name: jft-backend
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://jftuser:jftpassword@postgres:5432/jftdb
      JWT_SECRET: super_secret_key_change_this
      NODE_ENV: production
    networks:
      - jft-network
    ports:
      - "3000:3000"

frontend:
  build:
    context: ./frontend
    dockerfile: Dockerfile
    args:
      NEXT_PUBLIC_API_URL: "https://api.vjlink-edu.online"
  container_name: jft-frontend
  restart: always
  depends_on:
    - backend
  networks:
    - jft-network
  ports:
    - "3001:3000"

volumes:
  postgres_data:

networks:
  jft-network:
